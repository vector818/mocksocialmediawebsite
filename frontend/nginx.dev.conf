# Media proxy cache: 2GB disk limit, entries expire after 30 days of inactivity
proxy_cache_path /var/cache/nginx/media levels=1:2 keys_zone=media_cache:10m max_size=2g inactive=30d use_temp_path=off;

server {
  listen 80 default_server;
  server_name localhost;

  # index.html must never be cached — always fetch fresh so new bundle hashes are picked up
  location = /index.html {
    root /usr/share/nginx/html/dist;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    expires 0;
  }

  # hashed assets can be cached indefinitely
  location ~* \.(js|css|woff2?|ttf|eot|png|jpg|gif|ico|svg)$ {
    root /usr/share/nginx/html/dist;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
    try_files $uri =404;
  }

  # host static front-end files
  location / {
    root /usr/share/nginx/html/dist;
    try_files $uri /index.html;
  }
  
  # cached media endpoint
  location /api/user/facebook/media/ {
    proxy_pass http://local:8081;
    proxy_cache media_cache;
    proxy_cache_valid 200 30d;
    proxy_cache_use_stale error timeout updating;
    add_header X-Cache-Status $upstream_cache_status;
  }

  # node api reverse proxy
  location /api/ {
    proxy_pass http://local:8081;
  }

  # limit the body for request to 20 MB
  client_max_body_size 20M;
}
